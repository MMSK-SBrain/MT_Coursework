[pytest]
# Pytest Configuration for Student Handout Generator
# Version: 1.0

# Test Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add options for all test runs
addopts =
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Strict marker checking (only use defined markers)
    --strict-markers
    # Short traceback format (cleaner output)
    --tb=short
    # Show local variables in tracebacks (helpful for debugging)
    -l
    # Coverage reporting
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    # Coverage threshold (fail if below 80%)
    --cov-fail-under=80
    # Warnings handling
    -W default
    # Capture output (can use -s to disable)
    --capture=no

# Custom Markers
# Use with: pytest -m marker_name
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-component workflows
    security: Security validation tests
    performance: Performance and timing tests
    slow: Slow tests that take >5 seconds (skip with -m "not slow")
    requires_api: Tests requiring API keys (Claude API)
    requires_network: Tests requiring network access
    requires_fonts: Tests requiring font files
    requires_weasyprint: Tests requiring WeasyPrint installation

# Console Output Options
console_output_style = progress
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File Logging
log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(filename)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (prevent hanging)
timeout = 300
timeout_method = thread

# Ignore paths
norecursedirs = .git .tox dist build *.egg htmlcov __pycache__ .pytest_cache node_modules

# Minimum Python version
minversion = 3.11

# Import mode
pythonpath = .

# Filter warnings
filterwarnings =
    # Treat warnings as errors (strict)
    # error
    # Ignore specific warnings
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Allow warnings from our code
    default::UserWarning

# Doctest options (if using doctest)
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */dist-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
sort = Cover

# Exclude lines from coverage
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    pass

[coverage:html]
directory = htmlcov
