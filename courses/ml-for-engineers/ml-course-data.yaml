course:
  name: 'Machine Learning for Engineers: The AI-Assisted Approach'
  code: ML-ENG2
  duration_days: 120
  total_sessions: 41
  description: >-
    A 100% activity-oriented ML course designed for engineers with weak coding skills, teaching them to use LLMs
    (ChatGPT, Gemini, Claude) to learn and implement machine learning without writing code from scratch.
course_outcomes:
  - id: co-1
    code: ML-ENG-CO-1
    description: >-
      Apply LLM tools (ChatGPT, Gemini) to generate, analyze, and modify machine learning code for solving real-world
      problems
    category: Skill
    bloom_level: Apply
  - id: co-2
    code: ML-ENG-CO-2
    description: Evaluate and optimize machine learning models using appropriate metrics and AI-assisted debugging techniques
    category: Skill
    bloom_level: Evaluate
  - id: co-3
    code: ML-ENG-CO-3
    description: >-
      Design and implement end-to-end ML solutions for classification, regression, computer vision, and NLP problems
      using AI assistance
    category: Skill
    bloom_level: Create
  - id: co-4
    code: ML-ENG-CO-4
    description: >-
      Demonstrate effective prompt engineering skills to communicate ML requirements and iterate on AI-generated
      solutions
    category: Skill
    bloom_level: Apply
  - id: co-5
    code: ML-ENG-CO-5
    description: >-
      Deploy machine learning applications using cloud-based resources and explain their functionality to technical and
      non-technical audiences
    category: Skill
    bloom_level: Apply
modules:
