            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-8-4
            code: AELZC441-SO-2-8-4
            description: Calculate final drive ratio and analyze its impact on vehicle performance and fuel economy
