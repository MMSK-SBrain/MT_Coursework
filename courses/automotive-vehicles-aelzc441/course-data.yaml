course:
  name: Automotive Vehicles
  code: AELZC441
  credits: 3
  duration_days: 20
  total_sessions: 20
  session_duration: 2 hours (90 min lecture + 30 min Q&A)
  institution: BITS Pilani - M.Tech. Automotive Electronics
  description: >-
    Comprehensive study of automotive vehicle systems with physics and mathematics foundation, covering powertrain,
    transmission, chassis dynamics, electrical systems, and safety systems
  pedagogical_approach: Build confidence with familiar physics/math before introducing complex automotive systems
course_outcomes:
  - id: co-1
    code: AELZC441-CO-1
    description: >-
      Study main components/systems of an automobile (engine, transmission, drive-axle system, suspension system, brake
      system, etc.)
    category: Knowledge
    bloom_level: Understand
  - id: co-2
    code: AELZC441-CO-2
    description: Understand fundamental working principles of different systems
    category: Knowledge
    bloom_level: Understand
  - id: co-3
    code: AELZC441-CO-3
    description: Learn performance analysis along with working and important aspects of various components of automotive vehicles
    category: Skill
    bloom_level: Analyze
  - id: co-4
    code: AELZC441-CO-4
    description: Get acquainted with advanced concepts through projects and assignments
    category: Skill
    bloom_level: Apply
modules:
  - number: 1
    name: Vehicle Motion Fundamentals
    description: >-
      Apply physics and mathematics to analyze vehicle motion, calculate force and power requirements, and understand
      tire-road interaction fundamentals
    duration_sessions: 3
    module_outcome:
      id: mo-1
      code: AELZC441-MO-1
      description: >-
        Apply physics and mathematics to analyze vehicle motion, calculate force and power requirements, and understand
        tire-road interaction fundamentals
      category: Skill
      bloom_level: Apply
      parent_co: co-3
    lessons:
      - number: 1
        name: Forces Acting on a Moving Vehicle
        day: 1
        session_outcomes:
          - id: so-1-1-1
            code: AELZC441-SO-1-1-1
            description: Apply Newton's laws of motion to analyze forces acting on a moving vehicle
            category: Skill
            bloom_level: Apply
            session_type: lecture
            required: true
            parent_mo: mo-1
          - id: so-1-1-2
            code: AELZC441-SO-1-1-2
            description: Calculate rolling resistance force using coefficient of rolling resistance and vehicle weight
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-1-3
            code: AELZC441-SO-1-1-3
            description: Calculate aerodynamic drag force using drag coefficient, frontal area, and vehicle speed
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-1-4
            code: AELZC441-SO-1-1-4
            description: Calculate gradient resistance force for vehicles on inclined surfaces
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-1-5
            code: AELZC441-SO-1-1-5
            description: >-
              Determine total resistance force for different driving scenarios (level road, uphill, downhill, varying
              speeds)
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-1-6
            code: AELZC441-SO-1-1-6
            description: >-
              Explain vehicle performance metrics (acceleration, top speed, gradeability) and their dependence on
              resistance forces
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-1
      - number: 2
        name: Tires & Friction Fundamentals
        day: 2
        session_outcomes:
          - id: so-1-2-1
            code: AELZC441-SO-1-2-1
            description: Identify tire construction types (radial, bias-ply) and explain tire nomenclature and specifications
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-1
          - id: so-1-2-2
            code: AELZC441-SO-1-2-2
            description: Calculate normal force on tires and explain load distribution among wheels
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-2-3
            code: AELZC441-SO-1-2-3
            description: Apply friction principles to calculate maximum tire force using coefficient of friction and normal load
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-2-4
            code: AELZC441-SO-1-2-4
            description: Explain tire slip (longitudinal and lateral) and its relationship to tire force generation
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-1
          - id: so-1-2-5
            code: AELZC441-SO-1-2-5
            description: Describe the friction circle concept and analyze combined braking and cornering forces
            category: Skill
            bloom_level: Analyze
            session_type: lecture
            required: true
            parent_mo: mo-1
          - id: so-1-2-6
            code: AELZC441-SO-1-2-6
            description: Explain factors affecting tire grip (tire pressure, temperature, road surface, tire wear)
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-1
      - number: 3
        name: From Forces to Power Requirements
        day: 3
        session_outcomes:
          - id: so-1-3-1
            code: AELZC441-SO-1-3-1
            description: Convert linear force at tire contact patch to torque at wheel using wheel radius relationship
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-3-2
            code: AELZC441-SO-1-3-2
            description: Calculate wheel torque requirements for various driving conditions using force and radius
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-3-3
            code: AELZC441-SO-1-3-3
            description: Apply rotational motion equations to convert torque and rotational speed to power requirements
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-3-4
            code: AELZC441-SO-1-3-4
            description: Calculate vehicle acceleration performance (0-100 km/h time) using force, mass, and resistance
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-3-5
            code: AELZC441-SO-1-3-5
            description: Determine maximum gradeability for a vehicle using available tractive force and vehicle weight
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
          - id: so-1-3-6
            code: AELZC441-SO-1-3-6
            description: Calculate top speed of a vehicle by balancing available power with total resistance forces
            category: Skill
            bloom_level: Apply
            session_type: numerical
            required: true
            parent_mo: mo-1
  - number: 2
    name: Powertrain Systems
    description: >-
      Understand IC engine operation as a torque-generating device, analyze engine support systems, and compare power
      transmission mechanisms
    duration_sessions: 5
    module_outcome:
      id: mo-2
      code: AELZC441-MO-2
      description: >-
        Understand IC engine operation as a torque-generating device, analyze engine support systems, and compare power
        transmission mechanisms
      category: Knowledge
      bloom_level: Understand
      parent_co: co-2
    lessons:
      - number: 4
        name: Introduction to IC Engines (Simplified)
        day: 4
        session_outcomes:
          - id: so-2-4-1
            code: AELZC441-SO-2-4-1
            description: Explain the internal combustion engine as a device that converts fuel energy into rotational torque
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-4-2
            code: AELZC441-SO-2-4-2
            description: >-
              Identify major engine components (piston, cylinder, crankshaft, connecting rod, valves) and explain their
              mechanical functions
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-4-3
            code: AELZC441-SO-2-4-3
            description: Describe the 4-stroke engine cycle (intake, compression, power, exhaust) from a mechanical perspective
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-4-4
            code: AELZC441-SO-2-4-4
            description: Explain engine terminology (bore, stroke, displacement, compression ratio) and calculate engine capacity
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-4-5
            code: AELZC441-SO-2-4-5
            description: Interpret engine torque and power curves and explain their relationship to vehicle performance
            category: Skill
            bloom_level: Analyze
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-4-6
            code: AELZC441-SO-2-4-6
            description: >-
              Classify IC engines based on fuel type (petrol/diesel), number of cylinders, and configuration (inline, V,
              flat)
            category: Knowledge
            bloom_level: Remember
            session_type: lecture
            required: true
            parent_mo: mo-2
      - number: 5
        name: Engine Support Systems - Cooling & Lubrication
        day: 5
        session_outcomes:
          - id: so-2-5-1
            code: AELZC441-SO-2-5-1
            description: Explain why engines generate heat and the need for effective cooling systems
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-5-2
            code: AELZC441-SO-2-5-2
            description: Compare air-cooled and liquid-cooled systems and analyze their suitability for different applications
            category: Skill
            bloom_level: Analyze
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-5-3
            code: AELZC441-SO-2-5-3
            description: >-
              Identify cooling system components (radiator, thermostat, water pump, fan, coolant) and explain their
              operation
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-5-4
            code: AELZC441-SO-2-5-4
            description: >-
              Explain the need for engine lubrication and the functions of engine oil (friction reduction, heat
              dissipation, cleaning)
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-5-5
            code: AELZC441-SO-2-5-5
            description: Describe lubrication system components (oil pump, filter, oil galleries, sump) and oil circulation path
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-5-6
            code: AELZC441-SO-2-5-6
            description: >-
              Explain engine oil specifications (viscosity grades like 5W-30, API/ACEA classifications) and selection
