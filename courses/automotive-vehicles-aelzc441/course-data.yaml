            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
      - number: 6
        name: Engine Performance & Fuel Systems
        day: 6
        session_outcomes:
          - id: so-2-6-1
            code: AELZC441-SO-2-6-1
            description: >-
              Interpret engine performance maps (torque curve, power curve, BSFC map) and identify optimal operating
