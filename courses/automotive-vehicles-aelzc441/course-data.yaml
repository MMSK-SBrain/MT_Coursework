            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-6-5
            code: AELZC441-SO-2-6-5
            description: Explain air intake systems and the purpose of air filters, intake manifold, and throttle valve
            category: Knowledge
            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-6-6
            code: AELZC441-SO-2-6-6
            description: Describe basic emission types (CO, HC, NOx, PM) and introduce emission control requirements (BS4, BS6)
