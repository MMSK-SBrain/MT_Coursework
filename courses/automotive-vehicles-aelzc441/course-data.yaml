            category: Skill
            bloom_level: Analyze
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-6-2
            code: AELZC441-SO-2-6-2
            description: Explain the air-fuel mixture requirements for combustion and the stoichiometric ratio concept
