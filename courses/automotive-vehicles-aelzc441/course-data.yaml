            bloom_level: Understand
            session_type: lecture
            required: true
            parent_mo: mo-2
          - id: so-2-6-3
            code: AELZC441-SO-2-6-3
            description: Compare fuel delivery systems (carburetor vs fuel injection) and explain their basic operation
